name: CI

# Runs the Aspect CLI tasks on ephemeral GitHub-hosted runners. Each task is its
# own job so results show up as separate status checks. The Aspect CLI version is
# pinned by .aspect/version.axl; `setup-aspect` installs it and wires the GitHub
# Actions cache. See https://aspect.build/docs/cli/tasks-ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  # Required by the Aspect CLI artifact upload feature.
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - run: aspect test --task:name test -- //...

  gazelle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - run: aspect gazelle --task:name gazelle

  buildifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - run: aspect buildifier --task:name buildifier



